name: Process Daily Sword Videos

on:
  schedule:
    # Run at 2:00 PM UTC (7 AM PST / 10 AM EST) - 1 hour after data update
    - cron: '0 14 * * *'
  workflow_dispatch:  # Allow manual triggering
  workflow_run:
    workflows: ["Daily MLB Data Update"]
    types:
      - completed

concurrency:
  group: swordfinder-process-videos
  cancel-in-progress: false

jobs:
  process-videos:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Videos take longer
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Process yesterday's top sword videos
      env:
        PYTHONUNBUFFERED: '1'
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        AZURE_CONTAINER_NAME: ${{ secrets.AZURE_CONTAINER_NAME }}
      run: |
        # Add current directory to Python path for imports
        export PYTHONPATH="${PYTHONPATH}:${PWD}"
        python process_daily_sword_videos.py || (echo "Script failed. Testing imports..." && python test_workflow_imports.py)
    
    - name: Upload logs as artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: video-processing-logs
        path: |
          video_processing.log
          *.log
        retention-days: 7 
