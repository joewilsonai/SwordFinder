name: Production Smoke Check

on:
  schedule:
    # Run after the daily data and video workflows have had time to finish.
    - cron: '30 15 * * *'
  workflow_dispatch:

concurrency:
  group: swordfinder-production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check Railway API and Vercel UI
        env:
          API_BASE: https://swordfinder-production.up.railway.app
          UI_BASE: https://ui-one-henna.vercel.app
        run: |
          set -euo pipefail

          curl_json() {
            local label="$1"
            local url="$2"
            local out="$3"

            echo "::group::$label"
            curl --fail --show-error --silent --location \
              --retry 3 --retry-delay 5 --retry-all-errors \
              --connect-timeout 10 --max-time 45 \
              "$url" | tee "$out"
            echo "::endgroup::"
          }

          curl_ok() {
            local label="$1"
            local url="$2"

            echo "Checking $label: $url"
            curl --fail --show-error --silent --location --output /dev/null \
              --retry 3 --retry-delay 5 --retry-all-errors \
              --connect-timeout 10 --max-time 45 \
              "$url"
          }

          curl_json "API health" "$API_BASE/health" health.json
          grep -q '"database":"connected"' health.json

          curl_json "API live 2026 count" "$API_BASE/data/count?select=id&game_date=gte.2026-01-01&sword_score=gt.0" count.json
          grep -Eq '"count":[1-9][0-9]*' count.json

          curl_json "API recent sword" "$API_BASE/swords/recent?limit=1" recent.json
          grep -q '"sword_score"' recent.json
          latest_date="$(python3 - <<'PY'
          import json
          with open("recent.json") as f:
              rows = json.load(f)
          print(rows[0]["game_date"])
          PY
          )"
          test -n "$latest_date"

          curl_json "API video backlog" "$API_BASE/ops/video-backlog/status?date=${latest_date}&limit=1" video-backlog.json
          grep -q '"pending_videos"' video-backlog.json

          for route in / /leaderboards /ops /player/608369 /pitcher/660787 /assets/index.js /assets/ops.js /assets/supabase-rest.js; do
            curl_ok "UI route $route" "$UI_BASE$route"
          done
