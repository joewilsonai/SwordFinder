<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwordFinder | Daily Swords</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            screens: {
              xs: '420px',
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header id="top-nav" class="sticky top-0 z-50 border-b border-zinc-800/80 bg-black/70 backdrop-blur"></header>

    <main class="mx-auto flex w-full max-w-6xl flex-col gap-8 px-4 pb-12 pt-6 md:px-6 md:pt-10">
      <section class="hero-glow card overflow-hidden p-5 md:p-8">
        <div class="grid gap-6 md:grid-cols-12 md:items-end">
          <div class="md:col-span-8">
            <p class="text-xs uppercase tracking-[0.15em] text-zinc-400">2026 MLB Season Revival</p>
            <h1 class="brand-title mt-2 text-5xl leading-none text-zinc-100 md:text-7xl">Top Sword Swings</h1>
            <p id="hero-date" class="mt-3 text-lg text-zinc-300">Loading latest slate</p>
            <p class="mt-2 text-sm text-zinc-400">Autoplay is muted by default. Hover a clip to hear the crack and miss.</p>
            <div class="mt-5 flex max-w-sm flex-col gap-2">
              <label for="slate-date-input" class="text-xs uppercase tracking-[0.12em] text-zinc-500">Select Date</label>
              <input id="slate-date-input" class="ops-date-input w-full" type="date" />
            </div>
          </div>
          <div class="grid gap-3 xs:grid-cols-2 md:col-span-4 md:grid-cols-1">
            <div class="metric-tile p-3">
              <p class="text-[11px] uppercase tracking-[0.08em] text-zinc-500">Selected Date</p>
              <p id="metric-selected-date" class="text-2xl">--</p>
            </div>
            <div class="metric-tile p-3">
              <p class="text-[11px] uppercase tracking-[0.08em] text-zinc-500">Top Sword Score</p>
              <p id="metric-top-score" class="text-2xl">--</p>
            </div>
            <div class="metric-tile p-3">
              <p class="text-[11px] uppercase tracking-[0.08em] text-zinc-500">Biggest Miss</p>
              <p id="metric-biggest-miss" class="text-2xl">--</p>
            </div>
            <div class="metric-tile p-3">
              <p class="text-[11px] uppercase tracking-[0.08em] text-zinc-500">Clips Ready</p>
              <p id="metric-clips-ready" class="text-2xl">--</p>
            </div>
          </div>
        </div>
      </section>

      <section class="space-y-4">
        <div class="flex items-center justify-between gap-3">
          <h2 class="brand-title text-3xl">Top 5 Daily Swords</h2>
          <a href="/leaderboards.html" class="text-sm uppercase tracking-[0.08em] text-zinc-300 underline decoration-zinc-600 hover:decoration-[var(--accent-soft)]">Open full leaderboards</a>
        </div>
        <p id="status-text" class="text-sm text-zinc-400 loading-dots"></p>
        <div id="sword-cards" class="grid gap-4"></div>
        <div id="empty-state" class="hidden rounded-xl border border-dashed border-zinc-700 p-8 text-center text-zinc-400"></div>
      </section>
    </main>

    <footer id="app-footer" class="border-t border-zinc-800/80"></footer>

    <script src="/assets/config.js"></script>
    <script type="module" src="/assets/index.js"></script>
  </body>
</html>
